<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DjangoGram</title>
    {% load static %}

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body>

<header>
    <div class="logo">DjangoGram</div>
    <div class="nav">
        <a href="{% url 'index' %}">Home</a>
        <a href="{% url 'explore' %}">Explore</a>
        <a href="{% url 'user_profile' %}"> Profile </a>
        <a href="{% url 'post_create' %}">Create Post</a>
    </div>
    {% if user.is_authenticated %}
    User: {{ user.get_username }}
    <a href="{% url 'logout'%}?next={{request.path}}">Logout</a>
    {% else %}
    <p>You are not logged in</p>
    <a href="{% url 'login' %}?next={{request.path}}">Login</a>|
    <a href="{% url 'signup' %}">Sign Up</a>
    {% endif %}
        <form action="{% url 'search_view' %}" method="get">
            <input name="q" type="text" placeholder="Search...">
        </form>


</header>

<main>
    <!-- Здесь будет основной контент страницы -->
    {% block content %}
    {% endblock %}
</main>

<!-- Здесь подключение к скриптам JavaScript -->
</body>
</html>
